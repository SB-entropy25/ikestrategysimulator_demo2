# F1 War Room - Streamlit Secrets Configuration (Local Development)
# WARNING: NEVER commit this file or your credentials to GitHub/Git control!
# Add '.streamlit/secrets.toml' to your .gitignore file.

# The alphanumeric Spreadsheet ID of your Google Sheet (from URL)
GSHEETS_SPREADSHEET_ID = "your_spreadsheet_id_here"

# The name of the Google Sheet (used as fallback search)
GSHEETS_SPREADSHEET_NAME = "F1 War Room Leaderboard"

# Google Cloud Service Account Credentials
# Paste the respective fields from your downloaded JSON credential file below:
[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_CONTENT_LINE_BY_LINE_WITH_NEWLINES\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account-email@your-project-id.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "your-client-cert-url"
universe_domain = "googleapis.com"
